syntax = "proto3";

package helloworld.v1;

option go_package = "github.com/justblue/luoye/gen/go/helloworld;helloworldv1";

import "google/api/annotations.proto";

service Greeter {
  rpc SayHello (HelloRequest) returns (HelloReply) {
    option (google.api.http) = {
      get: "/v1/hello"
    };
  }
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}
