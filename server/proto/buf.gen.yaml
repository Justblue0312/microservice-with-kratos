version: v2
plugins:
    - local: protoc-gen-go
      out: ../gen/go
      opt: paths=source_relative

    - local: protoc-gen-go-grpc
      out: ../gen/go
      opt:
          - paths=source_relative
          - require_unimplemented_servers=false

    - local: protoc-gen-go-http
      out: ../gen/go
      opt: paths=source_relative

    - local: protoc-gen-openapi
      out: ../gen/openapi
      opt:
          - fq_schema_naming=true
