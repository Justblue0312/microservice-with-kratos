services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    command: --jetstream --http_port 8222

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  goodbye:
    build:
      context: ../..
      dockerfile: services/goodbye/Dockerfile
    ports:
      - "9082:9082"
      - "8082:8082"
    depends_on:
      - nats
      - redis

  hello:
    build:
      context: ../..
      dockerfile: services/hello/Dockerfile
    ports:
      - "9081:9081"
      - "8081:8081"
    depends_on:
      - nats
      - goodbye

  gateway:
    build:
      context: ../..
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - hello
      - goodbye
